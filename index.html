<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Friday EOD: Episode 1</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div id="game-container">
        <div id="title-screen">
            <h1>Friday<br>EOD</h1>
            <p>EPISODE 1: FINAL_V7</p>
            <button id="start-btn" onclick="startGame()">Start Shift</button>
        </div>
        <div id="hud">
            <div class="hud-left">
                <div id="clock-display">4:00 PM</div>
            </div>
            <div class="hud-right">
                <div class="stat-wrapper" id="wrap-quality">
                    <div>Quality</div>
                    <div class="meter-container"><div id="quality-bar"></div></div>
                </div>
                <div class="stat-wrapper" id="wrap-patience" style="margin-top: 8px;">
                    <div>Patience</div>
                    <div class="meter-container"><div id="patience-bar"></div></div>
                </div>
            </div>
        </div>
        <div id="viewport">
            <div id="trap-overlay" onclick="triggerTrap()"></div>
        </div>
        <div id="terminal" onclick="advanceDialogue()">
            <div id="speaker-name">Speaker</div>
            <div id="dialogue-text"></div>
            <div id="choices-container"></div>
        </div>
    </div>
    <script src="js/story.js"></script>
    <script src="js/game.js"></script>
</body>
</html>
