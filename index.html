<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Friday EOD: Episode 1</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div id="game-container">

        <!-- ══ TITLE SCREEN ══════════════════════════════════════ -->
        <div id="title-screen">
            <!-- L1: Static gradient background -->
            <img class="ts-bg" src="assets/images/Title_mainBG.png" alt="">

            <!-- L2: Scrolling city (two copies for seamless loop) -->
            <div class="ts-city-scroll">
                <img src="assets/images/Scrolling_BG_City.png" alt="">
                <img src="assets/images/Scrolling_BG_City.png" alt="">
            </div>

            <!-- L3: Characters -->
            <div class="ts-characters">
                <img src="assets/images/Title_Characters.png" alt="Characters">
            </div>

            <!-- Tap zones — positioned relative to #title-screen using pixel-accurate bounding boxes -->
            <div id="zone-priya" onclick="showCharBubble('priya', event)"></div>
            <div id="zone-tarun" onclick="showCharBubble('tarun', event)"></div>

            <!-- Chat bubbles — text injected by showCharBubble() in game.js -->
            <div class="char-bubble" id="bubble-priya" onclick="hideCharBubbles()"></div>
            <div class="char-bubble" id="bubble-tarun" onclick="hideCharBubbles()"></div>

            <!-- L4: Logo (AAA slam-in + float) -->
            <div class="ts-logo-wrap" id="ts-logo-wrap">
                <img src="assets/images/Logo.png" alt="Friday EOD">
            </div>

            <!-- Subtitle + CTA -->
            <div class="ts-ui">
                <p class="ts-subtitle">Vol 1 : Instructional Disaster</p>
                <button class="ts-btn" onclick="startGame()">START SHIFT</button>
            </div>
        </div>

        <!-- ══ GAME UI ════════════════════════════════════════════ -->
        <div id="hud">
            <div class="hud-left">
                <!-- Analog clock — hands rotated by JS in updateClockHands() -->
                <div id="clock-display">
                    <svg id="analog-clock" viewBox="0 0 60 60" width="52" height="52" aria-label="game time">
                        <!-- Face -->
                        <circle cx="30" cy="30" r="27" fill="#0a0a14" stroke="rgba(255,255,255,0.14)" stroke-width="1.5"/>
                        <!-- Cardinal pips -->
                        <circle cx="30" cy="5.5" r="2.2" fill="rgba(255,255,255,0.65)"/>
                        <circle cx="54.5" cy="30" r="1.5" fill="rgba(255,255,255,0.3)"/>
                        <circle cx="30" cy="54.5" r="1.5" fill="rgba(255,255,255,0.3)"/>
                        <circle cx="5.5"  cy="30" r="1.5" fill="rgba(255,255,255,0.3)"/>
                        <!-- Hour hand (points at 12, pivot at 30,30) -->
                        <line id="clk-h" x1="30" y1="32" x2="30" y2="18"
                              stroke="white" stroke-width="3.5" stroke-linecap="round"/>
                        <!-- Minute hand -->
                        <line id="clk-m" x1="30" y1="33" x2="30" y2="11"
                              stroke="#00e5ff" stroke-width="2.2" stroke-linecap="round"/>
                        <!-- Center cap -->
                        <circle cx="30" cy="30" r="2.8" fill="#00e5ff"/>
                    </svg>
                </div>
                <div class="hud-controls">
                    <button id="mute-btn" class="hud-icon-btn" onclick="toggleMute()">
                        <svg viewBox="0 0 24 24" width="19" height="19" fill="none" stroke="white" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
                            <polygon id="spk-body" points="11 5 6 9 2 9 2 15 6 15 11 19 11 5" fill="white" stroke="none"/>
                            <path id="spk-wave" d="M15.5 8.5a5 5 0 0 1 0 7"/>
                            <line id="spk-x1" x1="22" y1="9" x2="16" y2="15" display="none"/>
                            <line id="spk-x2" x1="16" y1="9" x2="22" y2="15" display="none"/>
                        </svg>
                    </button>
                    <button id="speed-btn" class="hud-icon-btn" onclick="cycleTypingSpeed()">
                        <svg id="speed-icon" viewBox="0 0 36 22" width="36" height="22">
                            <text id="speed-label" x="18" y="16"
                                  font-family="Outfit,sans-serif" font-weight="900"
                                  font-size="13" fill="white" text-anchor="middle">1×</text>
                        </svg>
                    </button>
                </div>
            </div>
            <div class="hud-right">
                <div class="stat-pill" id="wrap-quality">
                    <svg viewBox="0 0 12 12" width="11" height="11" fill="none" aria-label="Quality">
                        <path d="M6 1L7.3 4.5H11L8.1 6.8L9.1 10.3L6 8.1L2.9 10.3L3.9 6.8L1 4.5H4.7Z" fill="var(--success-green)"/>
                    </svg>
                    <div class="meter-mini"><div id="quality-bar"></div></div>
                </div>
                <div class="stat-pill" id="wrap-patience">
                    <svg viewBox="0 0 12 12" width="11" height="11" fill="none" aria-label="Patience">
                        <path d="M6 11C6 11 1 7.8 1 4.4 1 2.7 2.4 1.3 4.1 1.3 5 1.3 5.8 1.7 6 2.5 6.3 1.7 7 1.3 8 1.3 9.7 1.3 11 2.7 11 4.4 11 7.8 6 11 6 11Z" fill="var(--tarun-yellow)"/>
                    </svg>
                    <div class="meter-mini"><div id="patience-bar"></div></div>
                </div>
            </div>
        </div>
        <div id="viewport">
            <div id="scene-image" class="scene-layer"></div>
            <div id="scene-image-out" class="scene-layer"></div>
            <div id="fade-overlay"></div>
            <div id="loading-bar-container">
                <div id="loading-label">PUBLISHING... 99%</div>
                <div id="loading-bar-track"><div id="loading-bar-fill"></div></div>
            </div>
            <div id="trap-overlay" onclick="triggerTrap()"></div>
        </div>
        <div id="terminal" onclick="advanceDialogue()">
            <div id="speaker-name">Speaker</div>
            <div id="dialogue-text"></div>
            <div id="tap-hint">▼ tap anywhere to skip</div>
            <div id="ending-card"></div>
            <div id="choices-container"></div>
        </div>

    </div>
    <script src="js/story.js"></script>
    <script src="js/game.js"></script>
</body>
</html>
